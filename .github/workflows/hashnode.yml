name: 'Hashnode Blogs'

on:
  workflow_dispatch:
  schedule:
    - cron: '17 2 * * *' # Daily at 02:17 UTC (07:47 AM IST)

permissions:
  contents: write

jobs:
  update_blogs:
    name: 'Hashnode Latest Blogs'
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - name: 'Pull latest Hashnode posts'
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://blog.surajdev.tech/rss.xml"
          max_post_count: 2
          template: '<table><tr><td width="200"><a href="$url"><img src="$coverImage" width="200"/></a></td><td><a href="$url"><b>$title</b></a><br/>$date</td></tr></table>'
          custom_tags: "coverImage/enclosure/url"
          item_exec: "post.coverImage = item.enclosure && item.enclosure.url ? item.enclosure.url : '';"
          date_format: "mmm d, yyyy"
