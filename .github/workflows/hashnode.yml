name: 'Hashnode Blogs'

on:
  workflow_dispatch:
  schedule:
    - cron: '17 2 * * *' # Daily at 02:17 UTC (07:47 AM IST)

permissions:
  contents: write

jobs:
  update_blogs:
    name: 'Hashnode Latest Blogs'
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - name: 'Pull latest Hashnode posts'
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://blog.surajdev.tech/rss.xml"
          max_post_count: 2
