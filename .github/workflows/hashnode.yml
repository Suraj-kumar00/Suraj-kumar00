name: 'Hashnode Blogs'

on:
  workflow_dispatch:
  schedule:
    - cron: '17 2 * * *' # Runs daily at 02:17 UTC (07:47 AM IST)

jobs:
  update_blogs:
    name: 'Hashnode Latest Blogs'
    runs-on: ubuntu-latest
    steps:
      - name: 'Fetch Repository Contents'
        uses: actions/checkout@v4

      - name: 'Hashnode Blog Action'
        uses: Wandalen/wretry.action@master
        with:
          action: Sachin-chaurasiya/hashnode-blog-action@main
          with: |
            HASHNODE_PUBLICATION_NAME: blog.surajdev.tech
            POST_COUNT: 2
            FORMAT: stacked
          attempt_limit: 3
          attempt_delay: 15000
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
